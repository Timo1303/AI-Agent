<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent | Premium V2</title>
    <!-- Modern web typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Icon set -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Background dynamic elements -->
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <div class="app-container">
        <!-- AUTHENTICATION SCREEN -->
        <div id="auth-screen" class="glass-panel active">
            <div class="logo">
                <i data-lucide="brain-circuit"></i>
                <h1>AI Agent</h1>
            </div>
            
            <div class="auth-tabs">
                <button class="tab-btn active" onclick="switchAuthTab('login')">Login</button>
                <button class="tab-btn" onclick="switchAuthTab('register')">Registrieren</button>
            </div>

            <div id="login-form">
                <input type="text" id="login-username" placeholder="Username" autocomplete="off">
                <input type="password" id="login-password" placeholder="Passwort">
                <button class="primary-btn" onclick="login()">Einloggen</button>
            </div>

            <div id="register-form" style="display: none;">
                <input type="text" id="reg-username" placeholder="Wähle einen Username" autocomplete="off">
                <input type="password" id="reg-password" placeholder="Passwort">
                <button class="primary-btn" onclick="register()">Account erstellen</button>
            </div>
            
            <p id="auth-message"></p>
        </div>

        <!-- MAIN INTERFACE -->
        <div id="main-screen" class="glass-panel hidden">
            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="user-profile">
                    <div class="avatar"><i data-lucide="user"></i></div>
                    <div class="user-info">
                        <span id="display-username">Username</span>
                        <span class="badge" id="role-badge">User</span>
                    </div>
                </div>

                <div class="nav-links">
                    <button class="nav-btn active" onclick="showView('chat')"><i data-lucide="message-square"></i> Problemlöser</button>
                    <button class="nav-btn" onclick="showView('history')"><i data-lucide="history"></i> Verlauf</button>
                    <button class="nav-btn" id="admin-nav-btn" onclick="showView('admin')" style="display:none;"><i data-lucide="shield"></i> Admin Panel</button>
                </div>

                <button class="logout-btn" onclick="logout()"><i data-lucide="log-out"></i> Ausloggen</button>
            </aside>

            <!-- Chat View -->
            <main id="view-chat" class="view-content active">
                <div class="chat-header">
                    <h2>Neues Problem lösen</h2>
                </div>
                
                <div id="chat-stream" class="chat-stream">
                    <div class="welcome-message">
                        <i data-lucide="sparkles" class="magic-icon"></i>
                        <h3>Wie kann ich dir helfen?</h3>
                        <p>Beschreibe dein Problem, ich erstelle einen Plan und setze ihn um.</p>
                    </div>
                </div>

                <div class="input-area">
                    <textarea id="problem-input" placeholder="Beschreibe dein Problem detailliert..."></textarea>
                    <button class="send-btn" onclick="startAgent()">
                        <i data-lucide="send"></i>
                    </button>
                </div>
            </main>

            <!-- Admin View -->
            <main id="view-admin" class="view-content hidden">
                <div class="chat-header">
                    <h2>Admin Panel</h2>
                </div>
                <div class="admin-lists">
                    <h3>Ausstehende Genehmigungen</h3>
                    <div id="pending-list" class="user-list">Keine Anfragen</div>
                </div>
            </main>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
